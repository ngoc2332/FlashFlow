services:
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: flashflow-kafka
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://kafka:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "bash", "-c", "kafka-topics --bootstrap-server kafka:29092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.1
    container_name: flashflow-schema-registry
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_SCHEMA_COMPATIBILITY_LEVEL: BACKWARD

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: flashflow-kafka-ui
    depends_on:
      - kafka
      - schema-registry
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081

  postgres:
    image: postgres:16-alpine
    container_name: flashflow-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: flashflow
      POSTGRES_PASSWORD: flashflow
      POSTGRES_DB: flashflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flashflow -d flashflow"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: flashflow-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  prometheus:
    profiles: ["phase5"]
    image: prom/prometheus:v2.53.4
    container_name: flashflow-prometheus
    depends_on:
      - order-api
      - order-query-api
      - outbox-publisher
      - payment-worker
      - inventory-worker
      - order-status-updater
    ports:
      - "9090:9090"
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"

  grafana:
    profiles: ["phase5"]
    image: grafana/grafana:11.1.4
    container_name: flashflow-grafana
    depends_on:
      - prometheus
    ports:
      - "3002:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./ops/grafana/dashboards:/var/lib/grafana/dashboards:ro

  order-api:
    profiles: ["phase1", "phase2", "phase3", "phase4", "phase5"]
    build:
      context: .
      dockerfile: apps/order-api/Dockerfile
    container_name: flashflow-order-api
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      ORDER_API_PORT: 3000
      ORDER_API_SERVICE_NAME: order-api
      POSTGRES_URL: postgres://flashflow:flashflow@postgres:5432/flashflow
    ports:
      - "3000:3000"

  order-query-api:
    profiles: ["phase2", "phase3", "phase4", "phase5"]
    build:
      context: .
      dockerfile: apps/order-query-api/Dockerfile
    container_name: flashflow-order-query-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ORDER_QUERY_API_PORT: 3001
      ORDER_QUERY_API_SERVICE_NAME: order-query-api
      POSTGRES_URL: postgres://flashflow:flashflow@postgres:5432/flashflow
    ports:
      - "3001:3001"

  outbox-publisher:
    profiles: ["phase1", "phase2", "phase3", "phase4", "phase5"]
    build:
      context: .
      dockerfile: apps/outbox-publisher/Dockerfile
    container_name: flashflow-outbox-publisher
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_URL: postgres://flashflow:flashflow@postgres:5432/flashflow
      KAFKA_BROKERS: kafka:29092
      OUTBOX_CLIENT_ID: flashflow-outbox-publisher
      OUTBOX_POLL_INTERVAL_MS: 1000
      OUTBOX_BATCH_SIZE: 50
      OUTBOX_SERVICE_NAME: outbox-publisher
      OUTBOX_METRICS_PORT: 9400
    ports:
      - "9400:9400"

  payment-worker:
    profiles: ["phase2", "phase3", "phase4", "phase5"]
    build:
      context: .
      dockerfile: apps/payment-worker/Dockerfile
    container_name: flashflow-payment-worker
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_URL: postgres://flashflow:flashflow@postgres:5432/flashflow
      KAFKA_BROKERS: kafka:29092
      PAYMENT_SERVICE_NAME: payment-worker
      PAYMENT_CLIENT_ID: flashflow-payment-worker
      PAYMENT_CONSUMER_GROUP: payment-workers
      PAYMENT_EVENTS_TOPIC: payment.events
      PAYMENT_APPROVAL_LIMIT: 1000
      PAYMENT_FAIL_USER_PREFIX: fail-payment
      PAYMENT_METRICS_PORT: 9401
      RETRY_TOPIC_5S: order.retry.5s
      RETRY_TOPIC_1M: order.retry.1m
      ORDER_DLQ_TOPIC: order.dlq
    ports:
      - "9401:9401"

  inventory-worker:
    profiles: ["phase2", "phase3", "phase4", "phase5"]
    build:
      context: .
      dockerfile: apps/inventory-worker/Dockerfile
    container_name: flashflow-inventory-worker
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_URL: postgres://flashflow:flashflow@postgres:5432/flashflow
      KAFKA_BROKERS: kafka:29092
      INVENTORY_SERVICE_NAME: inventory-worker
      INVENTORY_CLIENT_ID: flashflow-inventory-worker
      INVENTORY_CONSUMER_GROUP: inventory-workers
      PAYMENT_EVENTS_TOPIC: payment.events
      INVENTORY_EVENTS_TOPIC: inventory.events
      INVENTORY_REJECT_USER_PREFIX: reject-inventory
      INVENTORY_FAIL_USER_PREFIX: fail-inventory
      INVENTORY_RESERVE_LIMIT: 800
      INVENTORY_METRICS_PORT: 9402
      RETRY_TOPIC_5S: order.retry.5s
      RETRY_TOPIC_1M: order.retry.1m
      ORDER_DLQ_TOPIC: order.dlq
    ports:
      - "9402:9402"

  order-status-updater:
    profiles: ["phase2", "phase3", "phase4", "phase5"]
    build:
      context: .
      dockerfile: apps/order-status-updater/Dockerfile
    container_name: flashflow-order-status-updater
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_URL: postgres://flashflow:flashflow@postgres:5432/flashflow
      KAFKA_BROKERS: kafka:29092
      STATUS_UPDATER_SERVICE_NAME: order-status-updater
      STATUS_UPDATER_CLIENT_ID: flashflow-order-status-updater
      STATUS_UPDATER_CONSUMER_GROUP: order-status-updaters
      PAYMENT_EVENTS_TOPIC: payment.events
      INVENTORY_EVENTS_TOPIC: inventory.events
      ORDER_STATUS_TOPIC: order.status
      STATUS_UPDATER_METRICS_PORT: 9403
      RETRY_TOPIC_5S: order.retry.5s
      RETRY_TOPIC_1M: order.retry.1m
      ORDER_DLQ_TOPIC: order.dlq
    ports:
      - "9403:9403"

volumes:
  kafka_data:
  postgres_data:
